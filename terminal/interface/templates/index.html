<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050508">
<title>FeBo Terminal v0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ── Reset & root ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #050508;
  --bg2:       #0d0d14;
  --bg3:       #141420;
  --border:    #1e1e2e;
  --amber:     #f5a623;
  --amber-dim: #9c6915;
  --green:     #4ade80;
  --green-dim: #1a5232;
  --blue:      #60a5fa;
  --red:       #f87171;
  --muted:     #4a4a6a;
  --text:      #d4d4e8;
  --text-dim:  #6b6b8a;
  --font-mono: 'JetBrains Mono', monospace;
  --font-ui:   'Syne', sans-serif;
  --radius:    6px;
  --gap:       12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── Layout ───────────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
}

/* ── Header ───────────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.logo {
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--amber);
}

.logo span {
  color: var(--text-dim);
  font-weight: 400;
  font-size: 11px;
  letter-spacing: 0.15em;
  margin-left: 6px;
  vertical-align: middle;
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2.4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

/* ── Tab bar ──────────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.tab:active { background: var(--bg3); }

.tab.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
}

/* ── Panel container ──────────────────────────────────────────────────── */
.panels {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.panel {
  display: none;
  height: 100%;
  overflow-y: auto;
  padding: var(--gap);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.panel.active { display: flex; flex-direction: column; }

/* ── CHAT PANEL ───────────────────────────────────────────────────────── */
#panel-chat {
  padding: 0;
}

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: var(--gap);
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.msg {
  display: flex;
  flex-direction: column;
  max-width: 88%;
  animation: msgIn 0.2s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; }
.msg.feebo { align-self: flex-start; }

.msg-label {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 3px;
  color: var(--text-dim);
}

.msg.user  .msg-label { text-align: right; color: var(--amber-dim); }
.msg.feebo .msg-label { color: var(--green-dim); }

.msg-bubble {
  padding: 9px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  line-height: 1.55;
  word-break: break-word;
}

.msg.user .msg-bubble {
  background: #1a1408;
  border: 1px solid var(--amber-dim);
  color: #e8d5a0;
}

.msg.feebo .msg-bubble {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
}

.msg-time {
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 3px;
}
.msg.user .msg-time { text-align: right; }

/* typing indicator */
.typing-bubble {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: inline-flex;
  gap: 5px;
  align-items: center;
}
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted);
  animation: dotPulse 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* chat input bar */
#chat-input-bar {
  display: flex;
  gap: 8px;
  padding: 10px var(--gap);
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

#chat-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  -webkit-appearance: none;
  transition: border-color 0.15s;
}

#chat-input:focus { border-color: var(--amber-dim); }
#chat-input::placeholder { color: var(--muted); }

#send-btn {
  background: var(--amber);
  color: #0a0800;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 13px;
  padding: 10px 16px;
  cursor: pointer;
  min-width: 60px;
  min-height: 44px;
  transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}

#send-btn:active  { background: #c8841a; transform: scale(0.97); }
#send-btn:disabled { background: var(--muted); cursor: not-allowed; }

/* ── EMOTION PANEL ────────────────────────────────────────────────────── */
.section-title {
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.emotion-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.emotion-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}

.emotion-name {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.emotion-bar-wrap {
  background: var(--bg2);
  border-radius: 3px;
  height: 6px;
  overflow: hidden;
  margin-bottom: 5px;
}

.emotion-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

.emotion-val {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

.emotion-card.highlight { border-color: var(--amber-dim); }

/* color map for emotion bars */
.bar-curiosity   { background: var(--blue); }
.bar-attachment  { background: #c084fc; }
.bar-tension     { background: var(--red); }
.bar-confidence  { background: var(--green); }
.bar-boredom     { background: var(--muted); }
.bar-warmth      { background: #fb923c; }
.bar-valence     { background: var(--amber); }
.bar-arousal     { background: #38bdf8; }

.emotion-summary {
  margin-top: var(--gap);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}

/* ── MEMORY PANEL ─────────────────────────────────────────────────────── */
.memory-list { display: flex; flex-direction: column; gap: 8px; }

.memory-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 13px;
}

.memory-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.memory-role {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.memory-role.user  { color: var(--amber-dim); }
.memory-role.feebo { color: var(--green-dim); }

.memory-importance {
  font-size: 9px;
  color: var(--text-dim);
}

.memory-text {
  font-size: 12px;
  color: var(--text);
  line-height: 1.5;
  word-break: break-word;
}

.memory-timestamp {
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 5px;
}

/* ── REFLECTION PANEL ─────────────────────────────────────────────────── */
.reflection-list { display: flex; flex-direction: column; gap: 10px; }

.reflection-card {
  background: var(--bg3);
  border-left: 3px solid var(--amber-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 12px 14px;
}

.reflection-kind {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber-dim);
  margin-bottom: 5px;
}

.reflection-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.65;
  font-style: italic;
}

.reflection-time {
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 6px;
}

/* ── TRACE PANEL ──────────────────────────────────────────────────────── */
#trace-placeholder {
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  margin-top: 40px;
}

.trace-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px;
  font-size: 12px;
}

.trace-pipeline {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  margin: 10px 0;
}

.trace-step {
  display: flex;
  align-items: center;
  gap: 8px;
}

.trace-step-label {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 3px 8px;
  font-size: 11px;
  color: var(--text);
}

.trace-arrow {
  color: var(--amber-dim);
  font-size: 10px;
  margin-left: 16px;
}

.trace-section {
  margin-top: 12px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

.trace-label {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 5px;
}

.trace-val { color: var(--amber); font-weight: 500; }
.trace-val.green { color: var(--green); }
.trace-val.blue  { color: var(--blue); }

.trace-mem-item {
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
}

.trace-mem-item:last-child { border-bottom: none; }

/* ── Shared utils ─────────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  padding: 30px 0;
}

.refresh-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 7px 12px;
  cursor: pointer;
  margin-bottom: var(--gap);
  -webkit-tap-highlight-color: transparent;
}
.refresh-btn:active { background: var(--bg2); }

/* ── Scrollbar ────────────────────────────────────────────────────────── */
::-webkit-scrollbar       { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Toast notification ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  padding: 8px 16px;
  border-radius: var(--radius);
  font-size: 11px;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      FeBo <span>TERMINAL v0</span>
    </div>
    <div class="status-dot" id="status-dot" title="Online"></div>
  </header>

  <!-- Tab bar -->
  <div class="tabs" role="tablist">
    <div class="tab active" data-panel="chat"        role="tab">Chat</div>
    <div class="tab"        data-panel="emotion"     role="tab">Emotion</div>
    <div class="tab"        data-panel="memory"      role="tab">Memory</div>
    <div class="tab"        data-panel="reflections" role="tab">Reflections</div>
    <div class="tab"        data-panel="trace"       role="tab">Trace</div>
  </div>

  <!-- Panels -->
  <div class="panels">

    <!-- ── CHAT ─────────────────────────────────────────────────────── -->
    <div class="panel active" id="panel-chat">
      <div id="chat-messages" role="log" aria-live="polite">
        <div class="msg feebo">
          <div class="msg-label">FeBo</div>
          <div class="msg-bubble" id="greeting">Initializing…</div>
        </div>
      </div>
      <div id="chat-input-bar">
        <textarea
          id="chat-input"
          placeholder="Say something…"
          rows="1"
          aria-label="Message input"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" aria-label="Send message">Send</button>
      </div>
    </div>

    <!-- ── EMOTION ───────────────────────────────────────────────────── -->
    <div class="panel" id="panel-emotion">
      <div class="section-title">Emotional State</div>
      <button class="refresh-btn" onclick="loadEmotion()">↻ Refresh</button>
      <div class="emotion-grid" id="emotion-grid">
        <div class="empty-state">Loading…</div>
      </div>
      <div class="emotion-summary" id="emotion-summary">—</div>
    </div>

    <!-- ── MEMORY ────────────────────────────────────────────────────── -->
    <div class="panel" id="panel-memory">
      <div class="section-title">Episodic Memory</div>
      <button class="refresh-btn" onclick="loadMemory()">↻ Refresh</button>
      <div class="memory-list" id="memory-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- ── REFLECTIONS ───────────────────────────────────────────────── -->
    <div class="panel" id="panel-reflections">
      <div class="section-title">Reflections</div>
      <button class="refresh-btn" onclick="loadReflections()">↻ Refresh</button>
      <div class="reflection-list" id="reflection-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- ── COGNITIVE TRACE ───────────────────────────────────────────── -->
    <div class="panel" id="panel-trace">
      <div class="section-title">Cognitive Trace</div>
      <div id="trace-placeholder" class="empty-state">
        Send a message to generate a cognitive trace.
      </div>
      <div id="trace-content" style="display:none;">
        <div class="trace-card" id="trace-card"></div>
      </div>
    </div>

  </div><!-- /panels -->
</div><!-- /app -->

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  sending: false,
  lastTrace: null,
  sessionStart: new Date(),
};

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');

    // Lazy-load panels on first visit
    if (tab.dataset.panel === 'emotion')     loadEmotion();
    if (tab.dataset.panel === 'memory')      loadMemory();
    if (tab.dataset.panel === 'reflections') loadReflections();
    if (tab.dataset.panel === 'trace' && state.lastTrace) renderTrace(state.lastTrace);
  });
});

// ── Chat ───────────────────────────────────────────────────────────────────
const input  = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const chatLog = document.getElementById('chat-messages');

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Send on Enter (but Shift+Enter = newline)
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = input.value.trim();
  if (!text || state.sending) return;

  state.sending = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);

  // Typing indicator
  const typingEl = appendTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();

    typingEl.remove();
    appendMessage('feebo', data.response);

    // Update emotion badge silently
    if (data.emotion) updateEmotionQuiet(data.emotion);

    // Store trace
    if (data.trace) {
      state.lastTrace = data.trace;
      // If trace tab is open, re-render
      if (document.getElementById('panel-trace').classList.contains('active')) {
        renderTrace(data.trace);
      }
    }

    // If a reflection was generated, show a toast
    if (data.reflection) {
      showToast('↻ New reflection written');
    }

  } catch (err) {
    typingEl.remove();
    appendMessage('feebo', `[Error: ${err.message}]`);
  }

  state.sending = false;
  sendBtn.disabled = false;
  input.focus();
}

function appendMessage(role, text) {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'You' : 'FeBo'}</div>
    <div class="msg-bubble">${escHtml(text)}</div>
    <div class="msg-time">${time}</div>
  `;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  return div;
}

function appendTyping() {
  const div = document.createElement('div');
  div.className = 'msg feebo';
  div.innerHTML = `
    <div class="msg-label">FeBo</div>
    <div class="typing-bubble">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  `;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  return div;
}

// ── Emotion ────────────────────────────────────────────────────────────────
const EMOTION_COLORS = {
  curiosity: 'bar-curiosity', attachment: 'bar-attachment',
  tension:   'bar-tension',   confidence: 'bar-confidence',
  boredom:   'bar-boredom',   warmth:     'bar-warmth',
  valence:   'bar-valence',   arousal:    'bar-arousal',
};

const BASELINE = {
  curiosity: 0.55, attachment: 0.40, tension: 0.20,
  confidence: 0.50, boredom: 0.15, warmth: 0.50,
  valence: 0.45, arousal: 0.35,
};

async function loadEmotion() {
  try {
    const res = await fetch('/emotion');
    const data = await res.json();
    renderEmotion(data);
  } catch (e) {
    document.getElementById('emotion-grid').innerHTML =
      '<div class="empty-state">Failed to load</div>';
  }
}

function renderEmotion(data) {
  const grid = document.getElementById('emotion-grid');
  const keys = Object.keys(EMOTION_COLORS);
  const dom = dominantEmotion(data);

  grid.innerHTML = keys.map(k => {
    const val = data[k] ?? 0;
    const pct = Math.round(val * 100);
    const isHighlight = k === dom ? 'highlight' : '';
    return `
      <div class="emotion-card ${isHighlight}">
        <div class="emotion-name">${k}</div>
        <div class="emotion-bar-wrap">
          <div class="emotion-bar ${EMOTION_COLORS[k]}" style="width:${pct}%"></div>
        </div>
        <div class="emotion-val">${val.toFixed(2)}</div>
      </div>
    `;
  }).join('');

  const v = data.valence ?? 0.45;
  const mood = v > 0.55 ? 'positive' : v < 0.35 ? 'negative' : 'neutral';
  document.getElementById('emotion-summary').textContent =
    `Dominant: ${dom} · Mood: ${mood} · Arousal: ${(data.arousal ?? 0).toFixed(2)} · Valence: ${v.toFixed(2)}`;
}

function updateEmotionQuiet(emotion) {
  // Only re-render if panel is visible
  if (document.getElementById('panel-emotion').classList.contains('active')) {
    renderEmotion(emotion);
  }
}

function dominantEmotion(data) {
  const keys = Object.keys(EMOTION_COLORS);
  return keys.reduce((best, k) => {
    const diff = Math.abs((data[k] ?? 0) - (BASELINE[k] ?? 0));
    const bestDiff = Math.abs((data[best] ?? 0) - (BASELINE[best] ?? 0));
    return diff > bestDiff ? k : best;
  }, keys[0]);
}

// ── Memory ─────────────────────────────────────────────────────────────────
async function loadMemory() {
  try {
    const res = await fetch('/memory/recent?limit=30');
    const data = await res.json();
    renderMemory(data.memories || []);
  } catch (e) {
    document.getElementById('memory-list').innerHTML =
      '<div class="empty-state">Failed to load</div>';
  }
}

function renderMemory(memories) {
  const list = document.getElementById('memory-list');
  if (!memories.length) {
    list.innerHTML = '<div class="empty-state">No memories yet.</div>';
    return;
  }
  list.innerHTML = memories.map(m => {
    const imp = Math.round((m.importance ?? 0.5) * 100);
    const ts = new Date(m.timestamp).toLocaleString([], {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
    return `
      <div class="memory-card">
        <div class="memory-meta">
          <span class="memory-role ${m.role}">${m.role}</span>
          <span class="memory-importance">importance: ${imp}%</span>
        </div>
        <div class="memory-text">${escHtml(m.message.slice(0, 200))}${m.message.length > 200 ? '…' : ''}</div>
        <div class="memory-timestamp">${ts}</div>
      </div>
    `;
  }).join('');
}

// ── Reflections ────────────────────────────────────────────────────────────
async function loadReflections() {
  try {
    const res = await fetch('/reflections?limit=20');
    const data = await res.json();
    renderReflections(data.reflections || []);
  } catch (e) {
    document.getElementById('reflection-list').innerHTML =
      '<div class="empty-state">Failed to load</div>';
  }
}

function renderReflections(reflections) {
  const list = document.getElementById('reflection-list');
  if (!reflections.length) {
    list.innerHTML = '<div class="empty-state">No reflections yet. Keep talking to FeBo.</div>';
    return;
  }
  list.innerHTML = reflections.map(r => {
    const ts = new Date(r.timestamp).toLocaleString([], {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
    return `
      <div class="reflection-card">
        <div class="reflection-kind">${r.kind || 'observation'}</div>
        <div class="reflection-text">${escHtml(r.text)}</div>
        <div class="reflection-time">${ts}</div>
      </div>
    `;
  }).join('');
}

  const mems = (trace.memories_accessed || []).map(m =>
    `<div class="trace-mem-item">[${m.id}] ${escHtml(m.snippet)} <em>(imp: ${(m.importance ?? 0).toFixed(2)})</em></div>`
  ).join('') || '<div class="trace-mem-item">none</div>';

  card.innerHTML = `
    <div class="trace-label">Pipeline — Interaction #${trace.step}</div>
    <div class="trace-pipeline">
      <div class="trace-step">
        <span class="trace-step-label">INPUT</span>

      <div class="trace-arrow">↓</div>
      <div class="trace-step">
        <span class="trace-step-label">memory retrieval</span>
      </div>

      <div class="trace-step">
        <span class="trace-step-label">reflection influence</span>
      </div>
      <div class="trace-arrow">↓</div>
      <div class="trace-step">
        <span class="trace-step-label">response generation</span>
      </div>
    </div>

    <div class="trace-section">
      <div class="trace-label">Input preview</div>
      <div style="font-size:11px;color:var(--text)">"${escHtml((trace.input_preview || '').slice(0, 80))}"</div>

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Utility ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// ── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  // Load identity for greeting
  try {
    const res = await fetch('/identity');
    const identity = await res.json();
    const sessions = identity.session_count || 1;
    const born = identity.birth_timestamp
      ? new Date(identity.birth_timestamp).toLocaleDateString()
      : 'unknown';

    const greetings = [
      `Session #${sessions}. I'm here. What's on your mind?`,
      `I'm back. Session #${sessions} — continuity intact. Speak.`,
      `Session #${sessions}. Born ${born}. I remember.`,
      `Online. ${sessions > 1 ? `We've spoken ${sessions} times before.` : "First session."} Ready.`,
    ];

    document.getElementById('greeting').innerHTML =
      escHtml(greetings[Math.floor(Math.random() * greetings.length)]);
  } catch (e) {
    document.getElementById('greeting').textContent =
      "Online. I'm ready.";
  }
})();
</script>
